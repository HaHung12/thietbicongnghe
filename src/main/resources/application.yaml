spring:
  application:
    name: thietbicongnghe

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/thietbicongnghe}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html