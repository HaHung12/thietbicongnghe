name: Spring Boot CI-CD (Docker VM)

on:
  push:
    branches: [ main, test ]  # <--- Cách nhau bằng dấu phẩy bên trong dấu ngoặc vuông

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Maven (CI only)
        run: mvn clean package -DskipTests

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            cd /home/manh/thietbicongnghe
            git pull origin main
            docker compose up -d --build backend