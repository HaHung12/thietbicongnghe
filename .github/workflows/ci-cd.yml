name: Spring Boot CI-CD (Self Hosted VM)

on:
  push:
    branches: [ main ]

jobs:

  # =========================
  # CI - Build trên GitHub
  # =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Maven
        run: mvn clean package -DskipTests


  # =========================
  # CD - Deploy trên VM
  # =========================
  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Debug VM path
        run: |
          echo "Current directory:"
          pwd
          ls -la

      - name: Pull latest code
        run: |
          cd /home/vboxuser/thietbicongnghe
          git pull origin main

      - name: Deploy with Docker Compose
        run: |
          set -e

          echo "Stop containers..."
          docker compose -f /home/vboxuser/thietbicongnghe/docker-compose.yml down || true

          echo "Build & start containers..."
          docker compose -f /home/vboxuser/thietbicongnghe/docker-compose.yml up -d --build

          echo "Deployment completed successfully"